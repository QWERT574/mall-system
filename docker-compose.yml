# ============================================
#  MiniMall 全栈容器化 - 开发/演示用
# 包含：MySQL 8.0 + Redis 7 + Spring Boot 后端
# 前端（admin-web/seller-web/web-mall）不容器化，本地启动更便于 HMR
#
# 用法：
#   1) cp .env.example .env 并填值
#   2) docker compose up -d          # 启动
#   3) docker compose logs -f backend # 查日志
#   4) docker compose down -v        # 停止并清理数据
# ============================================

services:
  # ============== MySQL 8.0 ==============
  mysql:
    image: mysql:8.0
    container_name: minimall-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-minimall}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=200
      - --innodb_buffer_pool_size=256M
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # 首次启动时自动执行建表 + 初始数据导入
      - ./backend/src/main/resources/sql/init_database.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -u
        - root
        - -p${MYSQL_ROOT_PASSWORD:-rootpass}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - minimall-net

  # ============== Redis 7 ==============
  redis:
    image: redis:7-alpine
    container_name: minimall-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - minimall-net

  # ============== Spring Boot 后端 ==============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: minimall-backend:latest
    container_name: minimall-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-8081}:8081"
    environment:
      # ---- 数据库（用容器内服务名作为主机名）----
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-minimall}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}

      # ---- Redis ----
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DATABASE: 0

      # ---- Server ----
      SERVER_PORT: 8081

      # ---- AI ----
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL:-https://api.deepseek.com/chat/completions}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:-https://api.deepseek.com/embeddings}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}

      # ---- JWT ----
      JWT_SECRET: ${JWT_SECRET:-change-me-please-use-256bit-random}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}

      # ---- RAG ----
      RAG_ENABLED: ${RAG_ENABLED:-true}

      # ---- Spring ----
      SPRING_PROFILES_ACTIVE: docker
      # init 脚本已通过 mysql docker-entrypoint-initdb.d 跑过，这里关闭避免重复
      SPRING_SQL_INIT_MODE: never

      # ---- JVM（可通过环境变量覆盖）----
      JAVA_OPTS: ${JAVA_OPTS:--XX:+UseG1GC -XX:MaxRAMPercentage=75.0 -Dfile.encoding=UTF-8}

      # ---- 时区 ----
      TZ: Asia/Shanghai
    volumes:
      # 持久化用户上传、图片、日志
      - backend-uploads:/app/data/uploads
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - minimall-net

# ============== 命名卷（数据持久化）==============
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  backend-uploads:
    driver: local
  backend-logs:
    driver: local

# ============== 自定义网络 ==============
networks:
  minimall-net:
    driver: bridge
    name: minimall-net
