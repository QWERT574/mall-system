<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Microsoft YaHei, Arial, sans-serif">
  <defs>
    <!-- UML 标准：include / extend 用开口箭头 -->
    <marker id="openArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#000" stroke-width="1.4" />
    </marker>
  </defs>

  <!-- 白底 -->
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff" />

  <style>
    .uc { fill: #fff; stroke: #000; stroke-width: 1.4; }
    .uc-text { font-size: 15px; fill: #000; text-anchor: middle; dominant-baseline: middle; }
    .boundary { fill: none; stroke: #000; stroke-width: 2; }
    .line { stroke: #000; stroke-width: 1.1; fill: none; }
    .dashed-line { stroke: #000; stroke-width: 1.2; stroke-dasharray: 6 4; fill: none; }
    .label { font-size: 12px; fill: #000; text-anchor: middle; dominant-baseline: middle; }
    .label-bg { fill: #fff; stroke: none; }
    .actor-text { font-size: 16px; fill: #000; text-anchor: middle; dominant-baseline: hanging; font-weight: 600; }
    .actor { stroke: #000; stroke-width: 1.6; fill: #fff; }
  </style>

  <!-- ========== 系统边界（无标题） ========== -->
  <rect class="boundary" x="130" y="80" width="940" height="500" />

  <!-- ========== 关联线（终点精算到椭圆边缘，不进椭圆体） ========== -->

  <!-- 买家 → 列 1 的 6 个用例（从 (60, 315) 出发） -->
  <g class="line">
    <line x1="60" y1="315" x2="272" y2="161" />
    <line x1="60" y1="315" x2="257" y2="229" />
    <line x1="60" y1="315" x2="229" y2="290" />
    <line x1="60" y1="315" x2="229" y2="340" />
    <line x1="60" y1="315" x2="257" y2="401" />
    <line x1="60" y1="315" x2="272" y2="469" />
  </g>

  <!-- 商家 → 列 2 的 4 个用例（从 (750, 620) 斜向扇出，避免重叠） -->
  <g class="line">
    <line x1="750" y1="620" x2="608" y2="207" />
    <line x1="750" y1="620" x2="610" y2="287" />
    <line x1="750" y1="620" x2="613" y2="367" />
    <line x1="750" y1="620" x2="618" y2="446" />
  </g>

  <!-- 管理员 → 列 3 的 5 个用例（从 (1140, 315) 出发） -->
  <g class="line">
    <line x1="1140" y1="315" x2="933" y2="190" />
    <line x1="1140" y1="315" x2="953" y2="257" />
    <line x1="1140" y1="315" x2="980" y2="312" />
    <line x1="1140" y1="315" x2="957" y2="365" />
    <line x1="1140" y1="315" x2="935" y2="430" />
  </g>

  <!-- ========== 用例椭圆（在关联线之上） ========== -->

  <!-- 列 1：买家（6 个） -->
  <ellipse class="uc" cx="300" cy="140" rx="80" ry="22" />
  <text class="uc-text" x="300" y="140">发起售后申请</text>
  <ellipse class="uc" cx="300" cy="210" rx="80" ry="22" />
  <text class="uc-text" x="300" y="210">选择问题类型</text>
  <ellipse class="uc" cx="300" cy="280" rx="80" ry="22" />
  <text class="uc-text" x="300" y="280">上传凭证图片</text>
  <ellipse class="uc" cx="300" cy="350" rx="80" ry="22" />
  <text class="uc-text" x="300" y="350">填写问题描述</text>
  <ellipse class="uc" cx="300" cy="420" rx="80" ry="22" />
  <text class="uc-text" x="300" y="420">申请平台介入</text>
  <ellipse class="uc" cx="300" cy="490" rx="80" ry="22" />
  <text class="uc-text" x="300" y="490">提交纠纷说明</text>

  <!-- 列 2：商家（4 个） -->
  <ellipse class="uc" cx="600" cy="185" rx="80" ry="22" />
  <text class="uc-text" x="600" y="185">商家协商</text>
  <ellipse class="uc" cx="600" cy="265" rx="80" ry="22" />
  <text class="uc-text" x="600" y="265">即时通讯沟通</text>
  <ellipse class="uc" cx="600" cy="345" rx="80" ry="22" />
  <text class="uc-text" x="600" y="345">同意退款</text>
  <ellipse class="uc" cx="600" cy="425" rx="80" ry="22" />
  <text class="uc-text" x="600" y="425">拒绝退款</text>

  <!-- 列 3：管理员（5 个） -->
  <ellipse class="uc" cx="900" cy="170" rx="80" ry="22" />
  <text class="uc-text" x="900" y="170">查看聊天记录</text>
  <ellipse class="uc" cx="900" cy="240" rx="80" ry="22" />
  <text class="uc-text" x="900" y="240">发送调解消息</text>
  <ellipse class="uc" cx="900" cy="310" rx="80" ry="22" />
  <text class="uc-text" x="900" y="310">标记调解状态</text>
  <ellipse class="uc" cx="900" cy="380" rx="80" ry="22" />
  <text class="uc-text" x="900" y="380">提交仲裁结果</text>
  <ellipse class="uc" cx="900" cy="450" rx="80" ry="22" />
  <text class="uc-text" x="900" y="450">查看处理记录</text>

  <!-- ========== 演员：UML 标准火柴人 ========== -->

  <!-- 买家（左中） -->
  <g class="actor">
    <circle cx="60" cy="315" r="9" />
    <line x1="60" y1="324" x2="60" y2="363" />
    <line x1="60" y1="333" x2="38" y2="353" />
    <line x1="60" y1="333" x2="82" y2="353" />
    <line x1="60" y1="363" x2="42" y2="393" />
    <line x1="60" y1="363" x2="78" y2="393" />
  </g>
  <text class="actor-text" x="60" y="405">买家</text>

  <!-- 商家（下中右，水平偏移以让连线扇形发散） -->
  <g class="actor">
    <circle cx="750" cy="600" r="9" />
    <line x1="750" y1="609" x2="750" y2="648" />
    <line x1="750" y1="618" x2="728" y2="638" />
    <line x1="750" y1="618" x2="772" y2="638" />
    <line x1="750" y1="648" x2="732" y2="678" />
    <line x1="750" y1="648" x2="768" y2="678" />
  </g>
  <text class="actor-text" x="750" y="690">商家</text>

  <!-- 管理员（右中） -->
  <g class="actor">
    <circle cx="1140" cy="315" r="9" />
    <line x1="1140" y1="324" x2="1140" y2="363" />
    <line x1="1140" y1="333" x2="1118" y2="353" />
    <line x1="1140" y1="333" x2="1162" y2="353" />
    <line x1="1140" y1="363" x2="1122" y2="393" />
    <line x1="1140" y1="363" x2="1158" y2="393" />
  </g>
  <text class="actor-text" x="1140" y="405">管理员</text>

  <!-- ========== include / extend 关系（标签避让线条） ========== -->
  <!-- 发起售后申请 include 到 选择问题类型（标签在线段右侧空白处） -->
  <line class="dashed-line" x1="300" y1="162" x2="300" y2="188" marker-end="url(#openArrow)" />
  <rect class="label-bg" x="310" y="168" width="62" height="14" />
  <text class="label" x="341" y="176">&lt;&lt;include&gt;&gt;</text>
</svg>
