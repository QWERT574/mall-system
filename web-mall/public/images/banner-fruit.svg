<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE0B2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <!-- 水果图案 -->
  <!-- 苹果 -->
  <circle cx="200" cy="200" r="60" fill="#f44336"/>
  <ellipse cx="200" cy="140" rx="8" ry="15" fill="#5d4037"/>
  <ellipse cx="220" cy="180" rx="15" ry="10" fill="#ffcdd2" opacity="0.6"/>
  
  <!-- 橙子 -->
  <circle cx="350" cy="220" r="55" fill="#ff9800"/>
  <circle cx="330" cy="200" r="10" fill="#ffe0b2" opacity="0.6"/>
  
  <!-- 葡萄 -->
  <circle cx="550" cy="180" r="20" fill="#9c27b0"/>
  <circle cx="530" cy="200" r="20" fill="#9c27b0"/>
  <circle cx="570" cy="200" r="20" fill="#9c27b0"/>
  <circle cx="520" cy="220" r="20" fill="#9c27b0"/>
  <circle cx="560" cy="220" r="20" fill="#9c27b0"/>
  <circle cx="600" cy="220" r="20" fill="#9c27b0"/>
  <line x1="550" y1="180" x2="550" y2="140" stroke="#5d4037" stroke-width="4"/>
  
  <!-- 叶子 -->
  <ellipse cx="250" cy="170" rx="40" ry="15" fill="#4caf50" transform="rotate(45 250 170)"/>
  <ellipse cx="400" cy="190" rx="35" ry="12" fill="#4caf50" transform="rotate(-30 400 190)"/>
  
  <!-- 文字 -->
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="48" fill="#1b3a1b" text-anchor="middle" font-weight="bold">新鲜水果</text>
  <text x="400" y="360" font-family="Arial, sans-serif" font-size="24" fill="#2d5a2d" text-anchor="middle">当季水果，产地直供</text>
</svg>
