<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F7FA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8bc34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4caf50;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 天空 -->
  <rect width="800" height="200" fill="url(#skyGrad)"/>
  
  <!-- 太阳 -->
  <circle cx="700" cy="60" r="40" fill="#ffc107"/>
  
  <!-- 云朵 -->
  <ellipse cx="150" cy="80" rx="60" ry="30" fill="white" opacity="0.8"/>
  <ellipse cx="200" cy="70" rx="50" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="400" cy="90" rx="70" ry="35" fill="white" opacity="0.8"/>
  
  <!-- 田野 -->
  <rect width="800" height="200" y="200" fill="url(#fieldGrad)"/>
  
  <!-- 田垄 -->
  <path d="M0 250 Q200 240 400 250 T800 250" stroke="#388e3c" stroke-width="3" fill="none"/>
  <path d="M0 280 Q200 270 400 280 T800 280" stroke="#388e3c" stroke-width="3" fill="none"/>
  <path d="M0 310 Q200 300 400 310 T800 310" stroke="#388e3c" stroke-width="3" fill="none"/>
  <path d="M0 340 Q200 330 400 340 T800 340" stroke="#388e3c" stroke-width="3" fill="none"/>
  
  <!-- 文字 -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="60" fill="#1b3a1b" font-weight="bold">乡村振兴</text>
  <text x="120" y="220" font-family="Arial, sans-serif" font-size="28" fill="#2d5a2d">优质农产品，新鲜直达</text>
  
  <!-- 装饰性植物 -->
  <g transform="translate(600, 250)">
    <line x1="0" y1="0" x2="0" y2="-80" stroke="#2d5a2d" stroke-width="4"/>
    <ellipse cx="-20" cy="-60" rx="25" ry="15" fill="#4caf50" transform="rotate(-30)"/>
    <ellipse cx="20" cy="-50" rx="25" ry="15" fill="#4caf50" transform="rotate(30)"/>
    <ellipse cx="0" cy="-80" rx="20" ry="12" fill="#8bc34a"/>
  </g>
</svg>

