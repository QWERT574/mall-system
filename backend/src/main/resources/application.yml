server:
  port: ${SERVER_PORT:8081}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    max-threads: 500
    min-spare-threads: 50
    max-connections: 20000
    accept-count: 2000
    connection-timeout: 20000

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:minimall}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&characterSetResults=utf8mb4&characterSetServer=utf8mb4&collationServer=utf8mb4_unicode_ci&connectionCollation=utf8mb4_unicode_ci&useLegacyDatetimeCode=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      connection-test-query: SELECT 1
      validation-timeout: 5000
      pool-name: MinimallHikariCP
  sql:
    init:
      mode: always
      continue-on-error: true
      platform: mysql
      encoding: UTF-8
  jpa:
    open-in-view: false
  
  # Redis 配置（已启用）
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: 5000
    lettuce:
      pool:
        max-active: 50
        max-idle: 20
        min-idle: 5
        max-wait: -1ms
  
  # 缓存配置
  cache:
    type: none
      
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # SQL 日志走 SLF4J (logback), 可被 logback-spring.xml / logging.level.* 灵活控制
    # - 生产: 已在 logback-spring.xml 中将 org.apache.ibatis 设为 WARN, 静默
    # - 开发: 启动时加 --logging.level.org.apache.ibatis=DEBUG 即可看到 SQL
    # - 同时, 走 SLF4J 意味着 SQL 也会带上我们注入的 traceId
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: false
    aggressive-lazy-loading: false
    multiple-result-sets-enabled: true
    use-column-label: true
    use-generated-keys: true
    auto-mapping-behavior: partial
    auto-mapping-unknown-column-behavior: warning
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-prefix: ""
    banner: false

# 日志配置
# 详细级别与输出策略统一由 logback-spring.xml 控制, 此处仅保留少量环境变量入口
# (生产默认 INFO, 开发可通过启动参数覆盖, 如: --logging.level.com.example.minimall=DEBUG)
logging:
  level:
    root: INFO
    com.example.minimall: INFO
  file:
    name: logs/minimall.log
    max-size: 50MB
    max-history: 30

# DeepSeek AI配置
deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  api-url: https://api.deepseek.com/chat/completions
  model: deepseek-v4-flash
  temperature: 0.7
  max-tokens: 2048

# AI 回复配置
ai:
  reply:
    common-queries: "根据您的需求，为您推荐几款优质农产品：有机蔬菜礼盒 (ID:123)，价格¥128.00；有机大米 (ID:456)，价格¥78.00；生态土鸡蛋 (ID:789)，价格¥68.00。这些都是来自乡村的天然好物，品质有保证。"
    recommend-products: "根据您的需求，为您推荐几款优质农产品：有机蔬菜礼盒 (ID:123)，价格¥128.00；有机大米 (ID:456)，价格¥78.00；生态土鸡蛋 (ID:789)，价格¥68.00。这些都是来自乡村的天然好物，品质有保证。"

# 文件上传配置
upload:
  # 上传路径 (相对路径: 优先解析为 user.dir 下, 其次尝试 user.dir/../<location>)
  # 运行时数据应放在源码树外, 故指向项目根 data/uploads/
  location: data/uploads
  # 最大文件大小（10MB）
  max-size: 10485760
  # 允许的图片格式
  allowed-types: image/jpeg,image/png,image/gif,image/webp
  # 图片压缩质量（0-100）
  compress-quality: 80
  # 图片最大宽度
  max-width: 1920
  # 图片最大高度
  max-height: 1920
  # 是否添加水印
  watermark-enabled: false
  # 水印文字
  watermark-text: "乡村振兴农产品平台"
  # 水印位置（center, top-left, top-right, bottom-left, bottom-right）
  watermark-position: bottom-right
  # 水印透明度（0-100）
  watermark-opacity: 50
  # 访问 URL 前缀
  url-prefix: /uploads/

# Spring 文件上传配置
spring.servlet.multipart:
  # 单个文件最大大小
  max-file-size: 10MB
  # 请求最大大小
  max-request-size: 50MB
  # 文件大小阈值，超过阈值会写入临时文件
  file-size-threshold: 2MB

# Spring Boot Actuator + Prometheus 暴露
# 注: /actuator 路径与 WebMvcConfig 已有路径不冲突; 若需鉴权可在 SecurityConfig 中放行
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true
    defaults:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name:minimall}
  prometheus:
    metrics:
      export:
        enabled: true

# 业务统一异常标签
info:
  app:
    name: ${spring.application.name:minimall}
    description: 农产品电商后台服务
